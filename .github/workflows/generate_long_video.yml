name: Generate Long-Form Deep Dive

on:
  schedule:
    - cron: "0 9 * * *"  # Daily at 09:00 UTC
  workflow_dispatch:
    inputs:
      privacy_status:
        description: "public, private or unlisted"
        required: false
        default: "public"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: long-dive-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY: ${{ github.event.inputs.privacy_status || 'public' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu-extra

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect video stats
        run: python -c "from analytics import fetch_and_update_stats, print_report; fetch_and_update_stats(); print_report()"

      - name: Generate long-form deep dive
        run: python generate_long_video.py

      - name: Cleanup build files
        if: always()
        run: rm -rf build/

      - name: Commit tracking data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history_long.json performance_log.json || true
          git diff --cached --quiet || (git commit -m "analytics: update performance data" && git pull --rebase && git push)
